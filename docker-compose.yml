version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vereniging_avg_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./.docker/apache:/etc/apache2/sites-available
    depends_on:
      - db
    networks:
      - avg_network
    environment:
      - DB_HOST=db
      - DB_NAME=vereniging_avg
      - DB_USER=user
      - DB_PASSWORD=password

  db:
    image: mariadb:10.11
    container_name: vereniging_avg_db
    ports:
      - "81:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=vereniging_avg
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    networks:
      - avg_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: vereniging_avg_phpmyadmin
    ports:
      - "8081:80"
    depends_on:
      - db
    environment:
      - PMA_HOST=db
      - PMA_USER=user
      - PMA_PASSWORD=password
    networks:
      - avg_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: vereniging_avg_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - avg_network

  cron:
    image: alpine:latest
    container_name: vereniging_avg_cron
    depends_on:
      - web
    networks:
      - avg_network
    command: >
      sh -c "echo '* * * * * wget -qO- http://web/run-cron?secret=avg_secret_123 > /dev/null 2>&1' > /etc/crontabs/root && crond -f -l 2"

volumes:
  db_data:

networks:
  avg_network:
    driver: bridge
